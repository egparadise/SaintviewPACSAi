# 파일럿/운영 오버레이 — 사용:
#   python deploy/gen_prod_conf.py   # nginx 인증 프록시 생성 (ORTHANC_PASSWORD 필요)
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml up -d
# 필수 env: SAINTVIEW_DB_PASSWORD, ORTHANC_PASSWORD (기본값 금지 — 백엔드 prod 게이트가 거부)
services:
  db:
    ports: []          # 외부 노출 차단 (백엔드만 docker 네트워크로 접근하거나 호스트 전용)

  orthanc:
    environment:
      ORTHANC__AUTHENTICATION_ENABLED: "true"   # 인증 재활성화
    ports:
      - "127.0.0.1:8042:8042"   # 로컬호스트 한정 (외부는 OHIF 프록시 경유)
      - "4242:4242"             # DICOM 수신은 병원망 개방

  ohif:
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./ohif/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro  # 인증 주입 프록시
