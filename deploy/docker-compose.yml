services:
  db:
    image: pgvector/pgvector:pg16
    container_name: saintview-db
    environment:
      POSTGRES_DB: saintview
      POSTGRES_USER: saintview
      POSTGRES_PASSWORD: ${SAINTVIEW_DB_PASSWORD:-saintview_dev}
    ports:
      - "5433:5432"
    volumes:
      - saintview_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saintview"]
      interval: 5s
      timeout: 3s
      retries: 10

  orthanc:
    image: orthancteam/orthanc:24.10.1
    container_name: saintview-orthanc
    environment:
      ORTHANC__NAME: "SaintviewOrthanc"
      ORTHANC__DICOM_AET: "SAINTVIEW"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__REGISTERED_USERS: '{"saintview": "${ORTHANC_PASSWORD:-saintview_dev}"}'
      # 개발: OHIF 프록시(인증 헤더 없음) 허용을 위해 비활성. 운영 배포 시 true + 프록시 인증 필수
      ORTHANC__AUTHENTICATION_ENABLED: "${ORTHANC_AUTH:-false}"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"
      ORTHANC__OVERWRITE_INSTANCES: "true"
      # ── SCP 수신 정책 (설정>장비·수신에서 토글 → deploy/scp-policy.env 생성 후 .env 반영·재기동) ──
      # 등록 장비만 수신(미등록 호스트/AET의 C-STORE 거부)
      ORTHANC__DICOM_CHECK_MODALITY_HOST: "${ORTHANC_CHECK_MODALITY_HOST:-false}"
      # Called AE Title 검증 (화면분석 §5.3)
      ORTHANC__DICOM_CHECK_CALLED_AET: "${ORTHANC_CHECK_CALLED_AET:-false}"
      # SCP 수신 리스너 on/off (false=DICOM 포트 닫음)
      ORTHANC__DICOM_SERVER_ENABLED: "${ORTHANC_DICOM_SERVER_ENABLED:-true}"
      # MWL(P2) — 백엔드 /api/orders/export-mwl이 .wl 파일을 쓰면 장비 C-FIND(MWL)에 응답
      ORTHANC__WORKLISTS__ENABLE: "true"
      ORTHANC__WORKLISTS__DATABASE: "/var/lib/orthanc/worklists"
    ports:
      - "8042:8042"   # HTTP / DICOMweb
      - "4242:4242"   # DICOM C-STORE
    volumes:
      - saintview_orthanc:/var/lib/orthanc/db
      - ./worklists:/var/lib/orthanc/worklists

  ohif:
    image: ohif/app:v3.9.2
    container_name: saintview-ohif
    depends_on:
      - orthanc
    ports:
      - "3000:80"
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./ohif/nginx-default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  saintview_pgdata:
  saintview_orthanc:
