# OHIF 정적 서빙 + /dicom-web → Orthanc 프록시 (같은 오리진으로 CORS 우회)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /dicom-web/ {
        # dev: Saintview 프론트(:5173)의 Cornerstone3D 볼륨 로딩 허용 (CORS)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Accept,Content-Type,Authorization" always;
        add_header Access-Control-Allow-Methods "GET,OPTIONS" always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://orthanc:8042/dicom-web/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        client_max_body_size 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
