# OHIF 정적 서빙 + /dicom-web → Orthanc 프록시 (같은 오리진으로 CORS 우회)

# /rendered Accept 결정 — Orthanc 는 accept 쿼리를 무시하고 헤더만 보므로(실측),
# 병원 설정(?accept=image/jpeg&quality=N)이 실제 동작하도록 쿼리를 헤더로 승격.
# 기본은 기존과 동일한 PNG(무손실 — 화질 불변), JPEG 는 명시 설정 시에만.
map $arg_accept $sv_rendered_accept {
    default                 "image/png";
    "image/jpeg"            "image/jpeg";
    "image%2Fjpeg"          "image/jpeg";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # /rendered: 브라우저 <img> Accept(image/avif…)를 Orthanc가 400 처리 → PNG/JPEG 로 강제.
    # 캐시 1시간(immutable 금지) — OverwriteInstances=true 라 동일 SOP 재전송(정정 영상) 시
    # stale 노출을 1시간으로 제한. `always` 미사용 = 2xx/3xx 에만 부여(404/502 캐시 고정 방지).
    location ~ ^/dicom-web/.*/rendered$ {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "private, max-age=3600";
        proxy_set_header Accept $sv_rendered_accept;
        proxy_set_header Host $host;
        proxy_pass http://orthanc:8042;
        proxy_http_version 1.1;
    }

    location /dicom-web/ {
        # dev: Saintview 프론트(:5173)의 Cornerstone3D 볼륨 로딩 허용 (CORS)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Accept,Content-Type,Authorization" always;
        add_header Access-Control-Allow-Methods "GET,OPTIONS" always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://orthanc:8042/dicom-web/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        client_max_body_size 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
