# 병원별 Orthanc 컨테이너 템플릿 (레인 O)
# POST /api/infra/hospitals/{hid}/provision 이 아래 자리표시자를 치환해
# deploy/generated/hospital-h{hid}.yml 로 저장한 뒤
# `docker compose -f <파일> -p saintview-h{hid} up -d` 로 기동한다.
#
# 치환 자리표시자(중괄호 2겹, HID/DICOM_PORT/WEB_PORT/VOLUME_DIR/ORTHANC_PASSWORD):
#   HID              병원 id
#   DICOM_PORT       호스트 DICOM(C-STORE) 포트 — 자동 할당(4300+hid)
#   WEB_PORT         호스트 HTTP/DICOMweb 포트 — 자동 할당(8100+hid)
#   VOLUME_DIR       병원별 스토리지(호스트 바인드 경로)
#   ORTHANC_PASSWORD Orthanc 계정 비밀번호(env SAINTVIEW_ORTHANC_PASSWORD)
services:
  orthanc-h1:
    image: orthancteam/orthanc:24.10.1
    container_name: saintview-orthanc-h1
    environment:
      ORTHANC__NAME: "SaintviewOrthanc-H1"
      ORTHANC__DICOM_AET: "SAINTVIEW_H1"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__REGISTERED_USERS: '{"saintview": "saintview_dev"}'
      # 병원별 컨테이너는 백엔드(httpx Basic 인증)만 접근 — 인증 기본 활성
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"
      ORTHANC__OVERWRITE_INSTANCES: "true"
      ORTHANC__DEFAULT_ENCODING: "Korean"
    ports:
      - "8101:8042"   # HTTP / DICOMweb
      - "4301:4242" # DICOM C-STORE
    volumes:
      - "C:/Project/SaintviewPACSai/deploy/generated/orthanc-h1-data:/var/lib/orthanc/db"
    restart: unless-stopped
