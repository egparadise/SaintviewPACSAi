<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Saintview 3D Viewer — MPR 3면(직교 평면) + 크로스헤어 모티프
       토큰: 배경 #1c1f23 / 평면 #1e6fd9(accent) / MIP 광선 #a78bfa(AI) / 크로스헤어 #22d3ee -->
  <defs>
    <linearGradient id="planeA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e6fd9" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#173a63" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="planeB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1e6fd9" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="mip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 다크 라운드 배경 -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="#1c1f23" stroke="#383d44" stroke-width="1.5"/>

  <!-- 직교 3평면 (등각 투영) -->
  <!-- Axial (수평면) -->
  <polygon points="14,36 32,28 50,36 32,44" fill="url(#planeB)" stroke="#38bdf8" stroke-width="1"/>
  <!-- Coronal (정면 수직면) -->
  <polygon points="14,18 50,18 50,36 14,36" fill="url(#planeA)" stroke="#1e6fd9" stroke-width="1" opacity="0.9"/>
  <!-- Sagittal (측면 수직면) -->
  <polygon points="32,12 32,44 32,44 32,12" stroke="none"/>
  <polygon points="32,12 44,18 44,40 32,46" fill="#0c3347" stroke="#38bdf8" stroke-width="1" opacity="0.85"/>

  <!-- MIP 투사 광선 (보라 = AI/렌더링 강조) -->
  <rect x="8" y="49" width="48" height="3" rx="1.5" fill="url(#mip)"/>

  <!-- 크로스헤어 -->
  <line x1="32" y1="8" x2="32" y2="22" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="32" y2="50" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="31" x2="24" y2="31" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="31" x2="54" y2="31" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="32" cy="31" r="3.2" fill="none" stroke="#22d3ee" stroke-width="1.6"/>
  <circle cx="32" cy="31" r="1" fill="#22d3ee"/>
</svg>
